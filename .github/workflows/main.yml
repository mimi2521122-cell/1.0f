name: 24/7 Telegram Cloud Hosting Bot

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '*/20 * * * *' # မိနစ် ၂၀ တိုင်း Bot အိပ်မသွားအောင် လှမ်းနိုးမည့်စနစ်
  workflow_dispatch: # Manual နှိပ်ပြီး Run ချင်လျှင် သုံးရန်

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Telegram Bot with Anti-Shutdown Loop
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        OWNER_ID: ${{ secrets.OWNER_ID }}
        ADMIN_ID: ${{ secrets.ADMIN_ID }}
        ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
      run: |
        echo "🚀 Starting Bot Script..."
        # GitHub Container မပိတ်သွားစေရန် အချိန် ၅ နာရီခွဲ (၃၃၀ မိနစ်) ကြာအောင် Loop ပတ်ပြီး Run ထားခြင်းဖြစ်သည်
        timeout 330m python dfd.py || true
        echo "🔄 Workflow interval restarting..."
